<!DOCTYPE html>
<html>
<head>
    <title>For Uyên Nhi 🎂💖</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(to top, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            overflow: hidden;
        }

        button {
            padding: 20px 30px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            background: white;
            cursor: pointer;
        }

        h1 {
            position: absolute;
            top: 20%;
            color: white;
            text-align: center;
        }

        .heart {
            position: absolute;
            color: red;
            font-size: 20px;
            animation: float 3s linear forwards;
        }

        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-600px); opacity: 0; }
        }
    </style>
</head>
<body>

<h1 id="text"></h1>
<button onclick="showLove()">Click me 🎁</button>

<script>
function showLove() {
    document.getElementById("text").innerHTML = "Happy Uyên Nhi's Birthday 🎂💖";

    for (let i = 0; i < 40; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 3000);
    }
}
</script>

</body>
</html>
